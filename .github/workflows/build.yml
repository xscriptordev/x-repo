name: Build Repo & Deploy Web

on:
  push:
    branches: ["main"]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # 1. TRABAJO DE COMPILACIÓN (Crea el paquete de X Linux con xpkg)
  build-repo:
    runs-on: ubuntu-latest
    container: archlinux:base-devel
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install toolchain and xpkg
        run: |
          pacman -Sy --noconfirm --needed rust cargo git openssl pkgconf
          cargo install --git https://github.com/xscriptordev/xpkg --locked xpkg

      - name: Build x-release package (XBUILD)
        run: |
          cd packages/x-release
          ~/.cargo/bin/xpkg build -o /tmp/xpkg-out

      - name: Create Repo Database
        run: |
          mkdir -p public/repo/x86_64
          cp /tmp/xpkg-out/*.xp public/repo/x86_64/
          cp /tmp/xpkg-out/*.xp.sig public/repo/x86_64/
          cd public/repo/x86_64

          repo-add x.db.tar.gz *.xp

          cp x.db.tar.gz x.db

          # Keep the detached db signature with stable alias names.
          if [ -f x.db.tar.gz.sig ]; then
            cp x.db.tar.gz.sig x.db.sig
          fi

      - name: Upload Repo Artifact
        uses: actions/upload-artifact@v4
        with:
          name: repo-files
          path: public/repo

  # 2. TRABAJO DE WEB (Construye Next.js y publica)
  deploy-web:
    needs: build-repo
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Download Repo Files
        uses: actions/download-artifact@v4
        with:
          name: repo-files
          path: public/repo

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          
      - name: Install & Build Next.js
        run: |
          npm ci
          npm run build
          
      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4