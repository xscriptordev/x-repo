name: Build Repo & Deploy Web

on:
  push:
    branches: ["main"]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # 1. TRABAJO DE COMPILACIÓN (Crea el paquete de X Linux con xpkg)
  build-repo:
    runs-on: ubuntu-latest
    container: archlinux:base-devel
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install toolchain and xpkg
        run: |
          pacman -Sy --noconfirm --needed rust cargo git openssl pkgconf
          cargo install --git https://github.com/xscriptor/xpkg --locked xpkg

      - name: Build x-release package (XBUILD)
        run: |
          cd packages/x-release
          ~/.cargo/bin/xpkg build -o /tmp/xpkg-out

      - name: Create Repositories (pacman and xpm)
        run: |
          set -euo pipefail

          mkdir -p public/repo/x86_64 public/x/x86_64

          # Copiar paquetes .xp generados por xpkg al endpoint x/ (para xpm)
          for pkg in /tmp/xpkg-out/*.xp; do
            [ -e "$pkg" ] || { echo "No .xp packages produced"; exit 1; }
            base="$(basename "$pkg" .xp)"
            cp "$pkg" "public/x/x86_64/$base.xp"
          done

          # Clonar paquetes al endpoint pacman renombrando a .pkg.tar.zst
          for pkg in /tmp/xpkg-out/*.xp; do
            base="$(basename "$pkg" .xp)"
            cp "$pkg" "public/repo/x86_64/$base.pkg.tar.zst"
          done

          # Base de datos para xpm (endpoint x/)
          (
            cd public/x/x86_64
            rm -f x.db* x.files* || true
            repo-add -n -R x.db.tar.gz *.xp
            rm -f x.db x.files
            cp x.db.tar.gz x.db
            cp x.files.tar.gz x.files
          )

          # Base de datos para pacman (endpoint repo/)
          (
            cd public/repo/x86_64
            rm -f x.db* x.files* || true
            repo-add -n -R x.db.tar.gz *.pkg.tar.zst
            rm -f x.db x.files
            cp x.db.tar.gz x.db
            cp x.files.tar.gz x.files
          )

      - name: Upload Repo Artifact
        uses: actions/upload-artifact@v4
        with:
          name: repo-files
          path: public

  # 2. TRABAJO DE WEB (Construye Next.js y publica)
  deploy-web:
    needs: build-repo
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Download Repo Files
        uses: actions/download-artifact@v4
        with:
          name: repo-files
          path: public

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          
      - name: Install & Build Next.js
        run: |
          npm ci
          npm run build
          
      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4